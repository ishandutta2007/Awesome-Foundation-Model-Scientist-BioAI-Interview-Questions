<svg width="800" height="200" viewBox="0 0 800 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1A2980" />
      <stop offset="100%" stop-color="#26D0CE" />
    </linearGradient>
    <style>
      .pulse { animation: pulse 3s infinite alternate; }
      @keyframes pulse {
        0% { opacity: 0.6; transform: scale(0.9); }
        100% { opacity: 1; transform: scale(1.1); }
      }
      .float { animation: float 6s ease-in-out infinite; }
      @keyframes float {
        0% { transform: translateY(0px); }
        50% { transform: translateY(-10px); }
        100% { transform: translateY(0px); }
      }
      .rotate { animation: rotate 10s linear infinite; transform-origin: center; }
      @keyframes rotate {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
    </style>
  </defs>
  <rect width="800" height="200" fill="url(#bgGradient)" rx="15" />
  
  <text x="400" y="90" font-family="'Segoe UI', Arial, sans-serif" font-size="38" font-weight="800" fill="#ffffff" text-anchor="middle" class="float">
    Foundation-Model Scientist (BioAI)
  </text>
  <text x="400" y="140" font-family="'Segoe UI', Arial, sans-serif" font-size="22" font-weight="600" fill="#E0F7FA" text-anchor="middle" class="float" style="animation-delay: -3s;">
    Interview Questions &amp; Resources 🧬🔬
  </text>
  
  <!-- Left Side Dynamic Graphics -->
  <g class="pulse" transform="translate(100, 100)">
    <circle cx="0" cy="0" r="45" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="8" />
    <circle cx="0" cy="0" r="30" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="4" />
    <g class="rotate">
      <circle cx="20" cy="0" r="5" fill="#fff" />
      <circle cx="-20" cy="0" r="5" fill="#fff" />
      <line x1="-20" y1="0" x2="20" y2="0" stroke="#fff" stroke-width="2" />
    </g>
  </g>
  
  <!-- Right Side Dynamic Graphics -->
  <g class="pulse" transform="translate(700, 100)" style="animation-delay: -1.5s;">
    <circle cx="0" cy="0" r="45" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="8" />
    <circle cx="0" cy="0" r="30" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="4" />
    <g class="rotate" style="animation-direction: reverse; animation-duration: 12s;">
      <circle cx="0" cy="20" r="5" fill="#fff" />
      <circle cx="0" cy="-20" r="5" fill="#fff" />
      <line x1="0" y1="-20" x2="0" y2="20" stroke="#fff" stroke-width="2" />
    </g>
  </g>
  
  <!-- Floating Particles -->
  <circle cx="200" cy="50" r="3" fill="#fff" opacity="0.5" class="float" style="animation-delay: -1s;" />
  <circle cx="600" cy="150" r="4" fill="#fff" opacity="0.6" class="float" style="animation-delay: -2s;" />
  <circle cx="300" cy="170" r="2" fill="#fff" opacity="0.4" class="float" style="animation-delay: -4s;" />
  <circle cx="500" cy="30" r="3" fill="#fff" opacity="0.5" class="float" style="animation-delay: -5s;" />
</svg>
